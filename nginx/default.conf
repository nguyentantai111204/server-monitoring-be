server {
    listen 80;
    server_name ubuntu-server-management.duckdns.org;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name ubuntu-server-management.duckdns.org;

    ssl_certificate /etc/letsencrypt/live/ubuntu-server-management.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ubuntu-server-management.duckdns.org/privkey.pem;

    # Cấu hình SSL tối ưu (Tùy chọn nhưng nên có)
    ssl_session_cache shared:le_SSL:10m;
    ssl_session_timeout 1440m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    location / {
        proxy_pass http://my-app_backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
