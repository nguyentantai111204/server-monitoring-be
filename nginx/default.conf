server {
    listen 80;
    server_name ubuntu-server-management.duckdns.org;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name ubuntu-server-management.duckdns.org;

    ssl_certificate /etc/letsencrypt/live/ubuntu-server-management.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ubuntu-server-management.duckdns.org/privkey.pem;

    # Cấu hình SSL tối ưu
    ssl_session_cache shared:le_SSL:10m;
    ssl_session_timeout 1440m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # 1. Điều hướng cho Backend API (Sửa từ / thành /api/)
    location /api/ {
        proxy_pass http://my-app_backend:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 2. Điều hướng cho Websocket (Cần thiết cho realtime)
    location /socket.io/ {
        proxy_pass http://my-app_backend:3000/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
    }

    # 3. Điều hướng cho Frontend (Chiếm giữ root /)
    location / {
        proxy_pass http://my-app_frontend:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
